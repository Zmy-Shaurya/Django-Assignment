{% extends 'blog/base.html' %}
{% block title %}Login - VlogHub{% endblock %}
{% block content %}
<div class="row justify-content-center min-vh-center">
    <div class="col-md-6 col-lg-5 my-auto">
        <div class="card form-card shadow-sm border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div style="font-size: 48px; margin-bottom: 15px;">
                        <i class="fas fa-sign-in-alt text-accent"></i>
                    </div>
                    <h2 class="card-title fw-bold">Welcome Back</h2>
                    <p class="text-muted">Sign in to your VlogHub account</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    
                    <!-- Username Field -->
                    <div class="mb-4">
                        <label for="id_username" class="form-label fw-semibold">
                            <i class="fas fa-user me-2 text-accent"></i>Username
                        </label>
                        <input type="text" name="username" autofocus required 
                               class="form-control form-control-modern" 
                               id="id_username" placeholder="Enter your username">
                    </div>

                    <!-- Password Field -->
                    <div class="mb-4">
                        <label for="id_password" class="form-label fw-semibold">
                            <i class="fas fa-lock me-2 text-accent"></i>Password
                        </label>
                        <input type="password" name="password" required 
                               class="form-control form-control-modern" 
                               id="id_password" placeholder="Enter your password">
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-accent btn-lg w-100 fw-semibold py-2 mb-3">
                        <i class="fas fa-arrow-right me-2"></i>Login
                    </button>
                </form>

                <!-- Signup Link -->
                <div class="text-center pt-3 border-top">
                    <p class="mb-0">
                        Don't have an account? 
                        <a href="{% url 'signup' %}" class="link-accent fw-semibold">Create one now</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
