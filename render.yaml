web:
  name: shaurya-blog
  plan: free
  runtime: python
  buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
  startCommand: gunicorn mysite.wsgi:application
  envVars:
    - key: PYTHON_VERSION
      value: 3.9
    - key: DEBUG
      value: false
    - key: SECRET_KEY
      generateValue: true
    - key: ALLOWED_HOSTS
      value: "*.onrender.com"
