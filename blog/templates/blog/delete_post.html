{% extends 'blog/base.html' %}
{% block title %}Delete Post - VlogHub{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 my-5">
        <div class="card alert-card alert-danger border-0 shadow-sm">
            <div class="card-body p-5 text-center">
                <div style="font-size: 64px; margin-bottom: 20px; color: #dc3545; opacity: 0.8;">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                
                <h2 class="card-title fw-bold mb-3">Delete Post?</h2>
                
                <div class="mb-4">
                    <p class="mb-2">You are about to delete:</p>
                    <p class="fs-5 fw-semibold text-dark mb-3">
                        "{{ post.title }}"
                    </p>
                    <p class="text-muted">
                        <i class="fas fa-info-circle me-2"></i>
                        This action cannot be undone. The post will be permanently deleted from VlogHub.
                    </p>
                </div>

                <form method="post" class="mt-5">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <a href="{% url 'post_detail' post.pk %}" class="btn btn-outline-secondary btn-lg flex-grow-1">
                            <i class="fas fa-times me-2"></i>Cancel
                        </a>
                        <button type="submit" class="btn btn-danger btn-lg flex-grow-1 fw-semibold">
                            <i class="fas fa-trash me-2"></i>Yes, Delete
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
